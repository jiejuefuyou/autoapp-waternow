name: WaterNow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  WaterNow:
    type: application
    platform: iOS
    sources:
      - path: WaterNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.waternow
        PRODUCT_NAME: WaterNow
        INFOPLIST_KEY_CFBundleDisplayName: WaterNow
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
schemes:
  WaterNow:
    build:
      targets:
        WaterNow: all
    run:
      config: Debug
    archive:
      config: Release
