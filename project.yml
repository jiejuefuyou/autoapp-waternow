name: WaterNow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  WaterNow:
    type: application
    platform: iOS
    sources:
      - path: WaterNow
        excludes:
          - "Resources/en.lproj"
          - "Resources/ja.lproj"
          - "Resources/zh-Hans.lproj"
          - "Resources/zh-Hant.lproj"
          - "Resources/ko.lproj"
          - "Resources/es.lproj"
          - "Resources/fr.lproj"
          - "Resources/de.lproj"
    resources:
      - path: WaterNow/Resources/en.lproj
      - path: WaterNow/Resources/ja.lproj
      - path: WaterNow/Resources/zh-Hans.lproj
      - path: WaterNow/Resources/zh-Hant.lproj
      - path: WaterNow/Resources/ko.lproj
      - path: WaterNow/Resources/es.lproj
      - path: WaterNow/Resources/fr.lproj
      - path: WaterNow/Resources/de.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.waternow
        PRODUCT_NAME: WaterNow
        INFOPLIST_KEY_CFBundleDisplayName: WaterNow
        INFOPLIST_KEY_CFBundleLocalizations: "en ja zh-Hans zh-Hant ko es fr de"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
  WaterNowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WaterNowUITests
    dependencies:
      - target: WaterNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.waternow.uitests
        TEST_TARGET_NAME: WaterNow
schemes:
  WaterNow:
    build:
      targets:
        WaterNow: all
        WaterNowUITests: [test]
    test:
      config: Debug
      targets:
        - WaterNowUITests
    run:
      config: Debug
    archive:
      config: Release
